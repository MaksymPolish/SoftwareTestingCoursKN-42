version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lab7-postgres
    environment:
      POSTGRES_DB: Lab7
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lab7_network

  api:
    image: lab7-api:latest
    container_name: lab7-api
    build:
      context: ./Lab7.Api
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=Lab7;Username=postgres;Password=postgres;"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lab7_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  lab7_network:
    driver: bridge
